name: Java CI (Maven)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
      - name: Create .m2 directory
        run: mkdir -p ~/.m2

      - name: Create settings.xml (Opcional si necesitas credenciales)
        run: |
          echo "<settings>...</settings>" > ~/.m2/settings.xml

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # habilita cache de dependencias

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar